services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Local machine (IntelliJ) থেকে কানেক্ট করতে localhost:9092 লাগবে
      # আর Docker container (Backend) থেকে কানেক্ট করতে kafka:29092 লাগবে
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    image: myjobs-backend
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      # আপনার অ্যাপ এখন ডকারের ভেতরে থাকা কাফকাকে এই ঠিকানায় খুঁজে পাবে
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # আপনার যদি আলাদা ডেটাবেস কন্টেইনার থাকে, তার URL এখানে দিতে হবে
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/myjob_portal