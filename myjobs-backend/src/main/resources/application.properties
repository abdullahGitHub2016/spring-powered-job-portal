# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/myjob_portal
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate Settings
# 'update' will create the table for you automatically when you run the app
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Clean logs: remove dialect and disable OSIV warning
spring.jpa.open-in-view=false

# Use a long random string for the secret
jwt.secret=Your_Very_Long_Random_Secret_Key_At_Least_64_Characters_Long_For_BDJobs_Backend
# Token valid for 24 hours (in milliseconds)
jwt.expiration=86400000

server.max-http-header-size=16KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.org.springframework.security=DEBUG

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
